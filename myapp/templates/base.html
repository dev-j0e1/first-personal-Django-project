<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        Django App
      {% endblock %}
    </title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"  rel="stylesheet" />
    <style>
      :root {
        --primary-blue: #1e3a5f;
        --secondary-blue: #2c5aa0;
        --accent-blue: #3b7ec1;
        --light-blue: #e8f0f8;
        --border-radius: 0.5rem;
        --the-green:  #d4edda;
      }

      body {
        background-color: #f8fbff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Navbar styling */
      .navbar {
        background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%) !important;
        box-shadow: 0 2px 8px rgba(30, 58, 95, 0.15);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .navbar-brand {
        font-weight: 600;
        color: white !important;
        font-size: 1.3rem;
        letter-spacing: 0.5px;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.8) !important;
        transition: all 0.3s ease;
        font-weight: 500;
        position: relative;
      }

      .nav-link:hover {
        color: white !important;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      }

      .nav-item.active .nav-link,
      .nav-link.active {
        color: #fff !important;
        font-weight: 700;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        animation: navActiveGlow 1.6s ease-in-out infinite;
      }

      .nav-item.active .nav-link::after,
      .nav-link.active::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #59d7ff, #4cb0ff, #2e76ff, #69b7ff);
        border-radius: 5px;
        animation: navActiveBar 1.8s ease-in-out infinite;
      }

      @keyframes navActiveGlow {
        0% { text-shadow: 0 0 8px rgba(255, 255, 255, 0.4); }
        50% { text-shadow: 0 0 18px rgba(255, 255, 255, 0.9); }
        100% { text-shadow: 0 0 8px rgba(255, 255, 255, 0.4); }
      }

      @keyframes navActiveBar {
        0%, 100% { transform: translateX(0); opacity: 0.75; }
        50% { transform: translateX(4px); opacity: 1; }
      }

      .nav-link.user-status {
        background: rgba(76, 175, 80, 0.2);
        color: #81c784 !important;
        border-radius: var(--border-radius);
        padding: 0.5rem 1rem !important;
        display: inline-block;
        font-weight: 600;
        border: 1px solid rgba(76, 175, 80, 0.4);
      }

      /* Cards */
      .card {
        border: none;
        border-radius: var(--border-radius);
        box-shadow: 0 2px 12px rgba(30, 58, 95, 0.08);
        transition: all 0.3s ease;
      }

      .card:hover {
        box-shadow: 0 4px 20px rgba(30, 58, 95, 0.15);
        transform: translateY(-2px);
      }

      .card-header {
        background: linear-gradient(135deg, var(--secondary-blue) 0%, var(--accent-blue) 100%);
        color: white;
        border: none;
        border-radius: var(--border-radius) var(--border-radius) 0 0;
        font-weight: 600;
      }

      .card-body {
        border-radius: 0 0 var(--border-radius) var(--border-radius);
      }

      /* Buttons */
      .btn-primary {
        background-color: var(--secondary-blue);
        border-color: var(--secondary-blue);
        border-radius: var(--border-radius);
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        background-color: var(--primary-blue);
        border-color: var(--primary-blue);
        box-shadow: 0 4px 12px rgba(30, 58, 95, 0.25);
      }

      .btn-outline-primary {
        color: var(--secondary-blue);
        border-color: var(--secondary-blue);
        border-radius: var(--border-radius);
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .btn-outline-primary:hover {
        background-color: var(--secondary-blue);
        border-color: var(--secondary-blue);
        color: white;
      }

      .btn-outline-danger {
        border-radius: var(--border-radius);
        font-weight: 500;
      }

      /* Flashy modern effect */
      .body-overlay,
      .background-stack {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(55deg, rgba(24, 85, 161, 0.16), rgba(3, 39, 112, 0.2), rgba(24, 85, 161, 0.16));
        z-index: -2;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle at 10% 20%, rgba(72, 167, 255, 0.15), transparent 30%),
          radial-gradient(circle at 80% 10%, rgba(106, 198, 255, 0.12), transparent 26%),
          radial-gradient(circle at 60% 80%, rgba(50, 160, 255, 0.1), transparent 35%);
        z-index: -1;
        opacity: 0.9;
      }

      .jumbotron {
        background: linear-gradient(120deg, #274a7a 10%, #1e2d5d 45%, #243f75 100%) !important;
        border-radius: 1rem;
        box-shadow: 0 8px 25px rgba(15, 25, 50, 0.35);
        margin-bottom: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .jumbotron h1 {
        color: #f0f9ff;
        text-shadow: 0 3px 18px rgba(22, 60, 90, 0.45);
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .jumbotron .lead {
        color: rgba(238, 249, 255, 0.92);
        text-shadow: 0 2px 14px rgba(17, 44, 72, 0.48);
      }

      .badge-success {
        background-color: #1a7f3d;
        color: white;
        box-shadow: 0 0 12px rgba(85, 209, 121, 0.4);
      }

      .badge-success .username-highlight {
        color: #d4ffb3;
        background: rgba(9, 121, 62, 0.2);
        box-shadow: 0 0 14px rgba(85, 209, 121, 0.3);
        font-size: 1rem;
      }

      .status-auth {
        background: linear-gradient(120deg, #2fd76e 0%, #0ba162 100%);
        color: #ffffff;
        border: 1px solid rgba(56, 175, 112, 0.7);
        box-shadow: 0 0 10px rgba(39, 215, 134, 0.45);
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .status-unauth {
        background: rgba(180, 180, 180, 0.18);
        color: #6f6f6f;
        border: 1px solid rgba(160, 160, 160, 0.35);
        box-shadow: none;
        font-weight: 600;
        text-transform: uppercase;
      }

      .card {
        border: 1px solid rgba(140, 175, 230, 0.25);
        background: rgba(255, 255, 255, 0.93);
        backdrop-filter: blur(6px);
      }

      .card-title {
        text-shadow: 0 1px 6px rgba(18, 42, 77, 0.26);
      }

      .cards-row > [class*="col-"] {
        display: flex;
        align-items: stretch;
      }

      .cards-row .card {
        width: 100%;
        display: flex;
        flex-direction: column;
      }

      .cards-row .card .card-body {
        flex: 1;
      }

      .cards-row .card .card-text {
        min-height: 1px;
      }

      .btn-primary {
        box-shadow: 0 6px 20px rgba(20, 95, 170, 0.38);
      }

      .btn-outline-primary {
        box-shadow: inset 0 0 0 1px rgba(64, 116, 184, 0.9), 0 2px 10px rgba(4, 20, 85, 0.2);
      }

      .alert {
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(246, 250, 255, 0.92);
      }

      /* Hero flare animation */
      @keyframes sparkle {
        0%, 100% { transform: translateX(0) translateY(0) scale(1); opacity: 0.6; }
        50% { transform: translateX(7px) translateY(-2px) scale(1.02); opacity: 1; }
      }

      .sparkle {
        animation: sparkle 4s ease-in-out infinite;
      }

      .sparkle-1 { animation-delay: 1s; }
      .sparkle-2 { animation-delay: 1.8s; }
      .sparkle-3 { animation-delay: 2.4s; }

      @media (max-width: 991.98px) {
        .navbar-nav.mr-auto,
        .navbar-nav.ml-auto {
          display: flex;
          justify-content: flex-start;
          flex-wrap: wrap;
          width: 100%;
          margin-left: 0 !important;
        }

        .navbar-nav .nav-item {
          width: auto;
          margin-right: 0.5rem;
        }

        .navbar-nav .nav-link,
        .nav-link.user-status {
          text-align: left;
          display: inline-block;
          width: auto;
          margin: 0.15rem 0;
        }
      }

      /* Page heading */

        transition: all 0.3s ease;
      }

      .btn-outline-danger:hover {
        transform: scale(1.05);
      }

      .btn-light {
        border-radius: var(--border-radius);
        font-weight: 500;
      }

      /* Jumbotron */
      .jumbotron {
        background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%) !important;
        border-radius: var(--border-radius);
        box-shadow: 0 4px 15px rgba(30, 58, 95, 0.2);
        margin-bottom: 2rem;
      }

      .jumbotron h1 {
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .jumbotron .lead {
        font-size: 1.15rem;
        font-weight: 300;
        opacity: 0.95;
      }

      /* Alerts */
      .alert {
        border: none;
        border-radius: var(--border-radius);
        font-weight: 500;
      }

      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
      }

      .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
      }

      .alert-info {
        background-color: #d1ecf1;
        color: #0c5460;
        border-left: 4px solid #17a2b8;
      }

      .alert-warning {
        background-color: #fff3cd;
        color: #856404;
        border-left: 4px solid #ffc107;
      }

      /* Badge */
      .badge {
        border-radius: var(--border-radius);
        padding: 0.5rem 0.75rem;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .badge-success {
        background-color: var(--secondary-blue);
      }

      .badge-success .username-highlight {
        background: rgba(76, 175, 80, 0.3);
        color: #81c784;
        padding: 0.2rem 0.5rem;
        border-radius: calc(var(--border-radius) / 2);
        font-weight: 700;
        margin-left: 0.3rem;
      }

      .badge-warning {
        background-color: var(--accent-blue);
        color: white;
      }

      /* Forms */
      .form-control {
        border-radius: var(--border-radius);
        border: 1px solid #e0e7f1;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 0.2rem rgba(59, 126, 193, 0.25);
      }

      .form-group label {
        color: var(--primary-blue);
        font-weight: 600;
      }

      /* Container and spacing */
      .container {
        border-radius: var(--border-radius);
      }

      /* Links */
      a {
        color: var(--secondary-blue);
        transition: all 0.3s ease;
      }

      a:hover {
        color: var(--primary-blue);
        text-decoration: underline;
      }

      @media (max-width: 991.98px) {
        .navbar-nav.mr-auto,
        .navbar-nav.ml-auto {
          display: flex;
          justify-content: flex-start;
          flex-wrap: wrap;
          width: 100%;
          margin-left: 0 !important;
        }

        .navbar-nav .nav-item {
          width: auto;
          margin-right: 0.5rem;
        }

        .navbar-nav .nav-link,
        .nav-link.user-status {
          text-align: left;
          display: inline-block;
          width: auto;
          margin: 0.15rem 0;
        }
      }

      /* Page heading */
      h1, h2, h3, h4, h5, h6 {
        color: var(--primary-blue);
        font-weight: 600;
      }
    </style>

  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="{% url 'home' %}">Django login flow project</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto" style="margin-left: 1.2rem;">
          <li class="nav-item{% if active_page == 'home' %} active{% endif %}">
            <a class="nav-link" href="{% url 'home' %}">Home</a>
          </li>
          <li class="nav-item{% if active_page == 'about' %} active{% endif %}">
            <a class="nav-link" href="{% url 'about' %}">About</a>
          </li>
          <li class="nav-item{% if active_page == 'contact' %} active{% endif %}">
            <a class="nav-link" href="{% url 'contact' %}">Contact</a>
          </li>
        </ul>

        <ul class="navbar-nav ml-auto">
          {% if user.is_authenticated %}
            <li class="nav-item">
              <span class="nav-link user-status">Hi, {{ user.username }}!</span>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            </li>
          {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}">Login</a>
            </li>
          {% endif %}
        </ul>
      </div>
    </nav>
    <div class="container mt-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js" ></script>
  </body>
</html>
