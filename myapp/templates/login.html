{% extends 'base.html' %}

{% block title %}
  Login - Django App
{% endblock %}

{% block content %}
  <div class="row justify-content-center mt-5">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h2 class="text-center mb-0">Login</h2>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="form-group">
              <label for="id_email">Email</label>
              <input 
                type="email" 
                class="form-control"
                id="id_email" 
                name="email" 
                placeholder="Enter your email..."
                required
              >
              {% if form.username.errors %}
                <div class="invalid-feedback d-block">
                  {{ form.username.errors.0 }}
                </div>
              {% endif %}
            </div>
            
            <div class="form-group">
              <label for="id_password">Password</label>
              <input 
                type="password" 
                class="form-control"
                id="id_password" 
                name="password" 
                placeholder="Enter your password..."
                required
              >
            </div>

            <div class="form-group form-check">
              <input type="checkbox" class="form-check-input" id="id_remember" name="remember_me">
              <label class="form-check-label" for="id_remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
          </form>
        </div>
      </div>
      
      <p class="text-center mt-3">
        Don't have an account? <a href="#">Sign up here</a>
      </p>
    </div>
  </div>

  <script>
    (function () {
      const emailInput = document.getElementById('id_email');
      const rememberCheckbox = document.getElementById('id_remember');
      const loginForm = document.querySelector('form');
      const STORAGE_KEY = 'remembered_email';

      // Initialize saved value
      const savedEmail = localStorage.getItem(STORAGE_KEY);
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberCheckbox.checked = true;
      }

      // Form submit handling
      loginForm.addEventListener('submit', function (event) {
        const emailValue = emailInput.value.trim();

        if (rememberCheckbox.checked && emailValue) {
          localStorage.setItem(STORAGE_KEY, emailValue);
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      });
    })();
  </script>
{% endblock %}
